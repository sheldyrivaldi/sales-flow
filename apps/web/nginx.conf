map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api to the backend service (mirrors Vite dev proxy). Upgrade/
    # Connection headers are required for the Hermes TUI feature's WebSocket
    # leg (/api/admin/hermes/tui/ws) — without them the WS handshake gets a
    # plain HTTP response instead of a 101 Switching Protocols and the
    # feature fails outright through this production build.
    location /api {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Default 60s proxy_read_timeout kills Company Profile PDF ingest
        # (EP-13): a real multi-page document sent to Hermes for vision-based
        # extraction is one long blocking call with no intermediate data —
        # ~20-25s/page observed, so a 20-page document can take 7-8 minutes.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Uploaded files (chat attachments, etc.) are served by the API's static
    # handler — proxy them through so <img src="/uploads/...">/PDF links resolve
    # instead of falling through to the SPA index.html.
    location /uploads {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
