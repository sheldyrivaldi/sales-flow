services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salespilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salespilot}
      POSTGRES_DB: ${POSTGRES_DB:-salespilot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salespilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-salespilot}:${POSTGRES_PASSWORD:-salespilot}@postgres:5432/${POSTGRES_DB:-salespilot}?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  hermes-bridge:
    build:
      context: ../services/hermes-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      PORT: "8642"
    ports:
      - "8642:8642"

volumes:
  pgdata:
