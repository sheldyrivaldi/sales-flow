services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salespilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salespilot}
      POSTGRES_DB: ${POSTGRES_DB:-salespilot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salespilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-salespilot}:${POSTGRES_PASSWORD:-salespilot}@postgres:5432/${POSTGRES_DB:-salespilot}?sslmode=disable
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - uploads:/app/data/uploads
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  hermes-bridge:
    build:
      context: ../services/hermes-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      PORT: "8642"
      # PENYEBAB UTAMA "API call failed after 3 retries" pada generate playbook.
      # hermes-agent memutus panggilan non-streaming yang belum mengirim byte
      # pertama dalam 90 detik (default _resolved_api_call_stale_timeout_base).
      # Penskalaan otomatisnya hanya melihat panjang INPUT (>50rb token),
      # sedangkan prompt kita kecil (~3rb token) tapi OUTPUT-nya besar (deck
      # belasan KB) — jadi batas 90 detik selalu dipakai dan generasi panjang
      # selalu diputus. Hermes sendiri sanggup long task; batas inilah yang
      # perlu dilonggarkan.
      HERMES_API_CALL_STALE_TIMEOUT: ${HERMES_API_CALL_STALE_TIMEOUT:-600}
      # Model cadangan dicoba HANYA bila diisi. Sengaja kosong: tetap memakai
      # satu model (HERMES_MODEL) supaya biaya tidak berubah. Isi hanya dengan
      # model yang tersedia di provider openai-codex (gpt-5.5, gpt-5.6-sol,
      # gpt-5.6-luna, gpt-5.6-terra) — di luar itu ditolak HTTP 400.
      HERMES_MODEL_FALLBACKS: ${HERMES_MODEL_FALLBACKS:-}
      # Without this + the volume below, Hermes workspace memory
      # (MEMORY.md/USER.md + the holographic memory_store.db, both under
      # get_hermes_home()) lives on the container's ephemeral filesystem and
      # is wiped on every restart/recreate — silently defeating EP-16's
      # entire premise ("memory accumulates across sessions"). The container
      # runs as root (no USER in Dockerfile), so home is /root.
      HERMES_HOME: /root/.hermes
    volumes:
      - hermes-memory:/root/.hermes
    ports:
      - "8642:8642"

  hermes-tui:
    build:
      context: ../services/hermes-tui
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    volumes:
      # Shares the SAME named volume as hermes-bridge (above), on purpose: a
      # device-code login done via the dashboard must be visible to chat
      # too, and vice versa — one Hermes workspace, two front doors. Mounted
      # at a DIFFERENT path than hermes-bridge's /root/.hermes because the
      # official hermes-agent image hardcodes HERMES_HOME=/opt/data (see
      # its baked-in image ENV) — same underlying volume, different
      # mountpoint per container, which Docker supports natively.
      - hermes-memory:/opt/data
    # Deliberately no published host port — reachable only from `api` over
    # the compose network (see Go's HERMES_TUI_BASE_URL, default
    # http://hermes-tui:9119). Go is the sole path in, same double-isolation
    # principle as hermes-bridge, but enforced from the start here rather
    # than as a later hardening step.

volumes:
  pgdata:
  uploads:
  hermes-memory:
